name: Create and publish a Docker image

on:
  push:
    branches: ['main']
    paths:
      - 'Dockerfile'
      - .github/workflows/build-image.yml
      - 'src/**/*'
      - 'yarn.lock'

concurrency: ${{ github.workflow }}
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on:
      group: builder
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # set latest tag for default branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,enable=true,prefix=,suffix=,format=short
            type=sha,enable=true,prefix=,suffix=,format=long
            type=ref,event=tag
            type=ref,event=pr,priority=100
            type=ref,event=branch,priority=100
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: GIT_COMMIT=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-qa:
    needs: [build-and-push-image]
    uses: ./.github/workflows/render-deploy.yml
    with:
      environment: qa
      polling-interval: '30000'
      image-tag: ${{ github.sha }}
    secrets: inherit

  deploy-sandbox:
    needs: [deploy-qa]
    uses: ./.github/workflows/render-deploy.yml
    with:
      environment: sandbox
      polling-interval: '30000'
      image-tag: ${{ github.sha }}
    secrets: inherit
